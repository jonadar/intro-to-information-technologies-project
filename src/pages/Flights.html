<!doctype html>
<html dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../styles/Style.css" />
        <script src="../javascript/templateLoad.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cielo</title>

    <body>
        <div class="base-container">
            <h1>flights</h1>
            <div class="search-component">
                <div class="text">
                    <h1>חיפוש חכם</h1>
                    <p>חפשו לפי מיקום\איזור\מזג אוויר והחיפוש החכם יעשה את השאר!</p>
                </div>

                <div class="rounded-container search-box">
                    <h2>חפש עכשיו!</h2>
                    <input type="text" placeholder="מיקום\איזור\מזג אוויר">
                    <br>
                    <button>חפש</button>
                </div>
            </div>

            <div class="rounded-container">
                <h2>סינון</h2>
                <div>
                    <input type="number" name="" id="">
                    <input type="number" name="" id="">
                </div>
            </div>

            <div id="content-list">
                
            </div>
        </div>
    </body>

    <script>
        const content = [
            {
                title: "41",
                description: "fasfksal kfskflaksfk askflasfk a",
                image: "https://images.unsplash.com/photo-1504893524553-b855bce32c67?auto=format&fit=crop&w=900&q=80",
                tags: ["A", "B"]
            },
            {
                title: "41",
                description: "fasfksal kfskflaksfk askflasfk a",
                image: "https://images.unsplash.com/photo-1504893524553-b855bce32c67?auto=format&fit=crop&w=900&q=80",
                tags: ["A", "B"]
            },
            {
                title: "41",
                description: "fasfksal kfskflaksfk askflasfk a",
                image: "https://images.unsplash.com/photo-1504893524553-b855bce32c67?auto=format&fit=crop&w=900&q=80",
                tags: ["A", "B"]
            },
            {
                title: "paris",
                description: "eifel tower tours, with lots of baguets",
                image: "https://tse1.mm.bing.net/th/id/OIP.WuC8RmUxa3O7XDq5tEYSEwHaF7?rs=1&pid=ImgDetMain&o=7&rm=3",
                tags: ["👽", "🗼"]
            }
        ];

        const contianer = document.getElementById("content-list");

        content.forEach(item => {
            const { title, description, image, tags } = item;

            const div = document.createElement("div");

            const h2 = document.createElement("h2");
            h2.innerText = title;

            const imageContainer = document.createElement("div");
            const img = document.createElement("img");
            img.src = image;
            imageContainer.append(img);
            imageContainer.classList.add("image-container");

            const desc = document.createElement("p");
            desc.innerText = description;

            const tagsContainer = document.createElement("div");
            tags.forEach(tag => {
                const span = document.createElement("span");
                span.innerText = tag;
                tagsContainer.append(span);
            });

            const button = document.createElement("button");
            button.innerText = "עוד פרטים";
            
            div.append(imageContainer);
            div.append(tagsContainer);
            div.append(h2);
            div.append(desc);
            div.append(button);
            contianer.append(div);
        })
    </script>
</html>
