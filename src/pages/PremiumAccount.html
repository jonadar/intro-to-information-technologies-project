<!doctype html>
<html dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../styles/Style.css" />
        <script src="../javascript/templateLoad.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>צור משתמש פרימיום</title>
    </head>

    <body>

        <div class="body-wrapper">
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />

            <div class="wrapper">
                <form action="">
                    <h1>יצירת חשבון פרימיום</h1>
                    <h2>
                        יוצרים חשבון פרימיום ומגלים עולם אחר של חופשות וחוויות
                        קנייה בסכום חודשי של 20 שקלים בלבד!
                    </h2>
                    <br />
                    <p>יש להזין את הפרטים הבאים:</p>

                    <div class="input-box">
                        <input type="text" placeholder="שם מלא" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="מייל" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="טלפון" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="שם משתמש" required />
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="סיסמה" required />
                    </div>

                    <div class="terms-conditions">
                        <input type="checkbox" />
                        <label>
                            <p>
                                אני מאשר/ת כי קראתי את
                                <a>התקנון העסק</a>
                                , שבו מפורטים תנאי החברות שלי, ואת
                                <a>מדיניות הפרטיות</a>
                                של החברה, המתארת את השימוש במידע האישי שלי וכיצד
                                הן שומרות עליו, ואני מסכימ/ה לכל תנאיהם.
                            </p>
                        </label>
                    </div>
                    <br />
                    <br />

                    <button type="submit" class="button">הבא</button>
                    <br />
                    <br />
                    <br />
                </form>

                <button
                    type="button"
                    class="small-button"
                    onclick="window.location.href = 'Login.html'"
                >
                    ביטול
                </button>
            </div>
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />
        </div>
    </body>
</html>
