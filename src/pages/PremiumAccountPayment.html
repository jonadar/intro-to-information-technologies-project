<!doctype html>
<html dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../styles/Style.css" />
        <script src="../javascript/templateLoad.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>רכישת מנוי פרימיום</title>
    </head>

    <body>
        <div class="body-wrapper">
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />

            <div class="wrapper">
                <form action="">
                    <h1>יצירת חשבון פרימיום</h1>
                    <h2>
                        כדי לסיים את תהליך רכישת מנוי הפרימיום, צריך להזין את
                        אמצעי התשלום למנוי.
                    </h2>
                    <h2>
                        ניתן לרכוש מנוי פרימיום על ידי תשלום בכרטיס אשראי בלבד!
                    </h2>
                    <br />
                    <p>יש להזין את הפרטים הבאים:</p>

                    <div class="input-box">
                        <input type="text" placeholder="מספר אשראי" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="תוקף חודש" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="תוקף שנה" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="שלוש ספרות" required />
                    </div>
                    <div class="input-box">
                        <input
                            type="password"
                            placeholder="תעודת זהות"
                            required
                        />
                    </div>

                    <div class="terms-conditions">
                        <input type="radio" />
                        <label>
                            <p>
                                אני מאשר/ת כי קראתי את
                                <a>התקנון העסק</a>
                                , שבו מפורטים תנאי החברות שלי, ואת
                                <a>מדיניות הפרטיות</a>
                                של החברה, המתארת את השימוש במידע האישי שלי וכיצד
                                הן שומרות עליו, ואני מסכימ/ה לכל תנאיהם.
                            </p>
                        </label>
                    </div>
                    <br />
                    <br />

                    <button type="submit" class="button">צור משתמש</button>
                    <br />
                    <br />
                    <br />
                </form>

                <button
                    type="button"
                    class="small-button"
                    onclick="window.location.href = 'PremiumAccount.html'"
                >
                    ביטול
                </button>
            </div>
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />
        </div>
    </body>
</html>
