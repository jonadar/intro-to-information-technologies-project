<!doctype html>
<html dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../styles/Style.css" />
        <script src="../javascript/templateLoad.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>איפוס פרטי התחברות</title>
    </head>

    <body>
        <div class="body-wrapper">
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />
            <br />

            <div class="wrapper">
                <form action="">
                    <h1>איפוס פרטי התחברות</h1>
                    <h2>
                        כדי לאפס את פרטי ההתחברות, ישלח קוד קד פעמי עם סיסמא
                        זמנית
                    </h2>
                    <br />
                    <p>
                        הקוד החד פעמי ישלח למייל או לישומון? יש למבחור ולמלא את
                        אחד מהם.
                    </p>

                    <div class="input-box">
                        <input type="text" placeholder="מספר טלפון" required />
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="מייל" required />
                    </div>
                    <br />
                    <br />

                    <button type="submit" class="button">
                        שלח לי קוד חד פעמי
                    </button>
                    <br />
                    <br />
                    <br />
                </form>

                <button
                    type="button"
                    class="small-button"
                    onclick="window.location.href = 'Login.html'"
                >
                    ביטול
                </button>
            </div>

            <br />
            <br />
            <br />
            <br />
            <br />
            <br />
        </div>
    </body>
</html>
